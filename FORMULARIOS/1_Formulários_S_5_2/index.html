<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário Simples 5_2</title>
    <link rel="stylesheet" href="estilo.css">
</head>
<body>
  <h2>fieldSet e legend</h2>
  <div class="relative">
   <form name="Cadastro" class="cursive" action="#">
      <div>
       <fieldset class="meu_fieldset">
          <legend class="legenda">Dados Pessoais</legend>

          <label>Nome:</label>
          <input type="text">
          <br>   
          <label>Idade:</label>
          <input type="number">
        </fieldset>
      </div> 
      <div class="painel_botoes">
        <input type="submit" value="Enviar">&nbsp;&nbsp;
        <input type="reset" value="Limpar">
     </div>     
  </form>  
 </div> 
</body>
</html>
