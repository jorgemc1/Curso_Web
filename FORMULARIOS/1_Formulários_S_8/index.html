<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário Simples 8</title>
    <link rel="stylesheet" href="estilo.css">
</head>
<body>
 <h2>Estrutura de checkbox</h2> 
  <div class="relative">
    <form name="Cadastro" class="cursive" action="#">
       <!-- Estrutura de checkbox -->
       <p>Escolha as frutas do seu sorvete:</p>
       <label>
          <input type="checkbox" name="frutas[]" value="uva">
           Uva
       </label><br>
       <label>
         <input type="checkbox" name="frutas[]" value="banana">
          Banana
       </label><br>
       <label>
          <input type="checkbox" name="frutas[]" value="laranja">
           Laranja
       </label><br>
       <label>
          <input type="checkbox" name="frutas[]" value="chocolate">
           Chocolate
       </label>
       <div class="painel_botoes">
          <input type="submit" value="Enviar">&nbsp;&nbsp;
          <input type="reset" value="Limpar">
       </div>  
    </form>  
 </div> 
</body>
</html>
