<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário Simples 7</title>
    <link rel="stylesheet" href="estilo.css">
</head>
<body>
 <h2>Estrutura de radio button</h2> 
  <div class="relative">
    <form name="Cadastro" class="cursive" action="#">
       <!-- Estrutura de radio button -->
       <p>Escolha uma linguagem:</p>
       <div class="radio_controle">
          <input type="radio" id="html" name="linguagem" value="HTML">
          <label for="html">HTML</label>
          <input type="radio" id="css" name="linguagem" value="CSS">
          <label for="css">CSS</label>
          <input type="radio" id="js" name="linguagem" value="JavaScript">
          <label for="js">JavaScript</label>
         </div>
         <div class="painel_botoes">
          <input type="submit" value="Enviar">&nbsp;&nbsp;
          <input type="reset" value="Limpar">
         </div>   
    </form>  
 </div> 
</body>
</html>
