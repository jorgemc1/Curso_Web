<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário Simples 6</title>
    <link rel="stylesheet" href="estilo.css">
</head>
<body>
  <h2>data list</h2>
  <div class="relative">
   <form name="Cadastro" class="cursive" action="#">
      <div>
       <p>Balas doces</p>
       <label for="sabor">Sabor</label>
       <input type="text" name="sabor" id="sabor" list="sabores" maxlength="30">
       <datalist id="sabores">
         <option value="Laranja"></option>
         <option value="Melancia"></option>
         <option value="Morango"></option>
         <option value="Limão"></option>
       </datalist>
      </div> 
      <div class="painel_botoes">
        <input type="submit" value="Enviar">&nbsp;&nbsp;
        <input type="reset" value="Limpar">
     </div>     
  </form>  
 </div> 
</body>
</html>
