<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário Simples</title>
    <link rel="stylesheet" href="estilo.css">
</head>
<body>
    <h2>Formulário Simples</h2>
    <div class="relative">
        <p class="paragrafo">Contato</p>
        <form name="Cadastro" class="cursive" action="#">
             <label class= "espaçamentov" for="nome">Nome:</label>
             <input class= "espaçamentov" type="text" id="nome" name="nome" size="30"><br>
             <label class= "espaçamentov" for="celular">Celular:</label>
             <input class= "espaçamentov" type="text" id="celular" name="celular"><br>
             <label class= "espaçamentov" for="email">Email:</label>
             <input class= "espaçamentov" type="text" id="email" name="email" size="30"><br>
        </form>
    </div>
    <div class="relative">
        <p class="paragrafo">Turma</p>
        <form name="Cadastro2" class="cursive" action="#">
             <label class= "espaçamentov" for="curso">Curso:</label>
             <input class= "espaçamentov" type="text" id="curso" name="curso" size="30"><br>
             <label class= "espaçamentov" for="turma">Turma:</label>
             <input class= "espaçamentov" type="text" id="turma" name="turma"><br>
             <label class= "espaçamentov" for="periodo">Periodo:</label>
             <input class= "espaçamentov" type="text" id="periodo" name="periodo" size="30"><br>
        </form>
    </div>
</body>
</html>
